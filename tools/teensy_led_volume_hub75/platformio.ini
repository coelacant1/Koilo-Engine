; PlatformIO configuration for Teensy 4.1 LED Volume HUB75 firmware.
;
; Uses the SmartMatrix library to drive two 64x32 HUB75 panels via the
; SmartLED Shield for Teensy 4 (V5).
;
; USB_DUAL_SERIAL provides two CDC ACM interfaces:
;   Serial    (/dev/ttyACM0) - debug output
;   SerialUSB1 (/dev/ttyACM1) - LED frame data (bulk transfer)
;
; Build: pio run
; Upload: pio run --target upload
; Monitor: pio device monitor

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps =
    pixelmatix/SmartMatrix@^4.0.3
build_flags = -D USB_DUAL_SERIAL
monitor_speed = 115200
upload_port = /dev/ttyACM0
