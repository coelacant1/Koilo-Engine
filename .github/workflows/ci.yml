name: KoiloEngine CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3 libsdl2-dev libglew-dev

      - name: CMake Configure
        run: ./build.sh configure

      - name: Generate Reflection Registry
        run: ./build.sh registry

      - name: Validate Reflection Headers
        run: python3 scripts/validate_reflection_headers.py --check

      - name: Show reflection cache
        run: |
          if [ -f build/generated/.koilo_reflect_cache.json ]; then
            echo "=== Reflection Cache ==="
            head -n 50 build/generated/.koilo_reflect_cache.json
          fi

      - name: Build koilo_core
        run: ./build.sh core

      - name: Verify koilo_core exists
        run: test -f build/libkoilo_core.a && echo "koilo_core built successfully"

      - name: Build koilo_reflect
        run: ./build.sh reflect

      - name: Verify koilo_reflect exists
        run: test -f build/libkoilo_reflect.so && echo "koilo_reflect built successfully"

      - name: Generate Test Skeletons
        run: ./build.sh test-skeletons

      - name: Show test skeleton cache
        run: |
          if [ -f build/generated/.test_skeleton_cache.json ]; then
            echo "=== Test Skeleton Cache ==="
            head -n 50 build/generated/.test_skeleton_cache.json
          fi

      - name: Build and Run Tests
        run: ./build.sh tests

      - name: Show test results
        if: always()
        run: |
          if [ -f build/Testing/Temporary/LastTest.log ]; then
            echo "=== Test Log ==="
            cat build/Testing/Temporary/LastTest.log
          fi

      - name: Header Compilation Check
        run: ./build.sh headercheck

      - name: Upload reflection cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reflection-cache
          path: build/generated/.koilo_reflect_cache.json
          if-no-files-found: ignore

      - name: Upload test skeleton cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-skeleton-cache
          path: build/generated/.test_skeleton_cache.json
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Testing/
          if-no-files-found: ignore

      - name: Build Summary
        run: |
          echo "================================"
          echo "KoiloEngine CI Complete"
          echo "================================"
          echo "Core library built"
          echo "Reflection library built"
          echo "Tests passed"
          echo "Headers validated"
          echo "================================"
